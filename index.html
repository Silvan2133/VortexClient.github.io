<!DOCTYPE html>
<html>
<head>
    <title>My Minecraft Client</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #0f0f0f, #1e1e1e);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            font-size: 50px;
            margin-top: 100px;
            color: #00ff88;
        }

        p {
            font-size: 20px;
            color: #cccccc;
        }

        .btn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 18px;
            background: #00ff88;
            color: black;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #00cc6a;
            transform: scale(1.05);
        }

        .box {
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <h1>My PvP Client</h1>
    <p>FPS Boost • Clean GUI • PvP Optimized</p>

    <div class="box">
        <button class="btn">Download</button>
    </div>

</body>
</html>
